<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャットサポート | Ladies Clinic LOG</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #f5f0e8;
      --bg-chat: #f9f6f0;
      --primary: #b8a88a;
      --primary-dark: #a89878;
      --text: #5c5c5c;
      --text-light: #999;
      --white: #ffffff;
      --border: #e0d8c8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      height: 100%;
      font-family: 'Noto Sans JP', sans-serif;
      color: var(--text);
      background: var(--bg-main);
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      background: var(--bg-main);
    }

    /* ヘッダー */
    .chat-header {
      padding: 24px 32px;
      background: var(--bg-main);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .chat-header-left h1 {
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.1em;
    }
    .chat-header-left p {
      font-size: 0.85rem;
      color: var(--text-light);
    }
    .online-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-light);
    }
    .online-dot {
      width: 10px;
      height: 10px;
      background: #7cb87c;
      border-radius: 50%;
    }

    /* メッセージエリア */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      background: var(--bg-chat);
    }
    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .message { margin-bottom: 24px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .message.bot { display: flex; gap: 16px; align-items: flex-start; }
    
    .bot-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: var(--text-light);
      font-weight: 400;
    }

    .message-content {
      background: var(--white);
      padding: 20px 24px;
      border-radius: 12px;
      border: 1px solid var(--border);
      max-width: 75%;
      font-size: 1rem;
      line-height: 1.9;
      white-space: pre-wrap;
      color: var(--text);
    }

    .message.user { display: flex; justify-content: flex-end; }
    .message.user .message-content {
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 12px;
    }

    /* ローディング */
    .loading-dots { display: flex; gap: 5px; padding: 8px 0; }
    .loading-dots span {
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* 入力エリア */
    .chat-input-area {
      padding: 20px 32px 32px;
      background: var(--bg-main);
      border-top: 1px solid var(--border);
    }
    .chat-input-wrapper {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 6px 6px 24px;
    }
    .chat-input {
      flex: 1;
      padding: 14px 0;
      border: none;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      background: transparent;
      color: var(--text);
    }
    .chat-input::placeholder { color: #bbb; }

    .send-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }
    .send-btn:hover:not(:disabled) { background: var(--primary-dark); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 20px; height: 20px; fill: var(--white); margin-left: 2px; }

    /* レスポンシブ */
    @media (max-width: 600px) {
      .chat-header { padding: 20px; }
      .chat-header-left h1 { font-size: 1.25rem; }
      .chat-messages { padding: 20px; }
      .chat-input-area { padding: 16px 20px 24px; }
      .message-content { max-width: 85%; padding: 16px 18px; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="chat-header-left">
        <h1>チャットサポート</h1>
        <p>AIがリアルタイムでお答えします</p>
      </div>
      <div class="online-status">
        <span class="online-dot"></span>
        オンライン
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <input type="text" class="chat-input" id="chatInput" placeholder="ご質問をどうぞ...">
        <button class="send-btn" id="sendBtn" aria-label="送信">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    var chatMessages = document.getElementById('chatMessages');
    var chatInput = document.getElementById('chatInput');
    var sendBtn = document.getElementById('sendBtn');
    var isLoading = false;
    var conversationHistory = [];

    // ページ読み込み時にウェルカムメッセージを表示
    window.addEventListener('load', function() {
      showWelcomeMessage();
      chatInput.focus();
    });

    function showWelcomeMessage() {
      var welcomeText = 'こんにちは。Ladies Clinic LOG へようこそ。\nご予約・料金・検査についてお気軽にご質問ください。';
      addBotMessage(welcomeText);
      conversationHistory.push({ role: 'assistant', content: welcomeText });
    }

    async function sendMessage() {
      var text = chatInput.value.trim();
      if (!text || isLoading) return;
      addUserMessage(text);
      conversationHistory.push({ role: 'user', content: text });
      chatInput.value = '';
      isLoading = true;
      updateInputState();
      var loadingEl = showLoading();

      try {
        var response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: conversationHistory.filter(function(m) { return m.role !== 'assistant' || conversationHistory.indexOf(m) > 0; })
          })
        });
        var data = await response.json();
        loadingEl.remove();
        if (response.ok && data.message) {
          addBotMessage(data.message);
          conversationHistory.push({ role: 'assistant', content: data.message });
        } else {
          addBotMessage('申し訳ございません。エラーが発生しました。\nお手数ですが、お電話またはLINEでお問い合わせください。');
        }
      } catch (error) {
        loadingEl.remove();
        addBotMessage('申し訳ございません。接続エラーが発生しました。\nお手数ですが、お電話またはLINEでお問い合わせください。');
      } finally {
        isLoading = false;
        updateInputState();
      }
    }

    function updateInputState() { chatInput.disabled = isLoading; sendBtn.disabled = isLoading; }

    function showLoading() {
      var messageDiv = document.createElement('div');
      messageDiv.className = 'message bot';
      messageDiv.innerHTML = '<div class="bot-avatar">L</div><div class="message-content"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
      chatMessages.appendChild(messageDiv);
      scrollToBottom();
      return messageDiv;
    }

    function addBotMessage(text) {
      var messageDiv = document.createElement('div');
      messageDiv.className = 'message bot';
      messageDiv.innerHTML = '<div class="bot-avatar">L</div><div class="message-content">' + escapeHtml(text) + '</div>';
      chatMessages.appendChild(messageDiv);
      scrollToBottom();
    }

    function addUserMessage(text) {
      var messageDiv = document.createElement('div');
      messageDiv.className = 'message user';
      messageDiv.innerHTML = '<div class="message-content">' + escapeHtml(text) + '</div>';
      chatMessages.appendChild(messageDiv);
      scrollToBottom();
    }

    function escapeHtml(text) { var div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') { sendMessage(); } });
  </script>
</body>
</html>
